name: tcga-gbm-analysis
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy scipy statsmodels openpyxl python-docx requests
      - name: Run analysis
        run: |
          if [ -f scripts/analysis.py ]; then python scripts/analysis.py; else mkdir -p out && echo hello > out/hello.txt; fi
      - uses: actions/upload-artifact@v4
        with:
          name: tcga-gbm-results
          path: out/
          if-no-files-found: error
