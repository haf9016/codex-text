name: Temporary TCGA GBM differential expression

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tcga_de.yml'
      - 'run_tcga_de.py'
  pull_request:
    branches: [main]
    paths:
      - 'tcga_de_trigger.txt'
      - 'run_tcga_de.py'
      - '.github/workflows/tcga_de.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas scipy matplotlib

      - name: Run matched TCGA mutation-expression analysis
        env:
          MPLBACKEND: Agg
        run: |
          mkdir -p results
          set +e
          python run_tcga_de.py > results/run.log 2>&1
          status=$?
          echo "$status" > results/exit_status.txt
          cat results/run.log
          exit 0

      - name: Package results
        if: always()
        run: |
          tar -czf tcga_gbm_splicing_de_results.tar.gz results
          sha256sum tcga_gbm_splicing_de_results.tar.gz > tcga_gbm_splicing_de_results.sha256

      - name: Upload analysis artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcga-gbm-splicing-de-results
          path: |
            results/
            tcga_gbm_splicing_de_results.tar.gz
            tcga_gbm_splicing_de_results.sha256
          retention-days: 7
